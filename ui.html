<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>token-frog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray: #d9d9d9;
      --gray-text: #959595;
      --green: #28a007;
      --red: #f15353;
      --yellow: #ffeb00;

      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--black);
      background: var(--white);
    }

    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: var(--gray);
      padding: 32px 36px; transition: padding 0.15s;
      flex-shrink: 0;
    }
    .header-row { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      display: none; background: none; border: none; cursor: pointer;
      padding: 4px; line-height: 0; color: var(--black);
    }
    .back-btn svg { width: 22px; height: 22px; transform: rotate(90deg); stroke: var(--black); stroke-width: 1.5px; }
    .header-frog { width: 40px; height: auto; }
    .header-title { font-size: 14px; font-weight: 500; }
    .header-version { color: var(--gray-text); }
    .header-meta { color: var(--gray-text); margin-top: 4px; line-height: 1.4; font-size: 14px; }
    .rescan-btn {
      display: none; margin-left: auto; background: var(--white); border: none;
      padding: 6px 12px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500;
      font-size: 12px; cursor: pointer; white-space: nowrap; color: var(--black);
    }
    .rescan-btn:hover { background: var(--black); color: var(--white); }

    /* ── Scanning state ─────────────────────────────────── */
    .scanning-view {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100%; padding: 40px 36px 20px;
    }
    .scanning-frog { width: 172px; height: auto; margin-bottom: 16px; }
    .thinking-dots { display: flex; gap: 6px; }
    .thinking-dot {
      width: 10px; height: 10px; background: var(--gray);
      animation: think 1.2s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ── Main scrollable area ────────────────────────────── */
    .main { flex: 1; overflow-y: auto; overflow-x: hidden; }

    /* ── Pre-scan view ────────────────────────────────────── */
    .prescan {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100%; padding: 40px 36px 20px;
    }
    .frog-container { margin: 20px 0 12px; }
    .frog-container img { width: 172px; height: auto; display: block; }
    .prescan-msg { color: var(--gray-text); text-align: center; font-size: 14px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { flex-shrink: 0; padding: 0 36px 20px; }
    .status-row {
      background: var(--gray); height: 32px;
      display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
    }
    .status-dot { width: 12px; height: 12px; background: var(--gray); flex-shrink: 0; }
    .status-dot.active { background: var(--green); }
    .status-info { display: flex; align-items: center; gap: 4px; }
    .status-text { font-size: 14px; }
    .scan-btn {
      width: 100%; height: 82px; background: var(--black); color: var(--gray-text);
      border: none; cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 30px;
    }
    .scan-btn.ready { color: var(--white); }
    .scan-btn:disabled { cursor: default; }

    /* ── Accordion ────────────────────────────────────────── */
    .accordion { padding: 0; display: flex; flex-direction: column; gap: 0; }
    .accordion-section { border-bottom: 2px solid var(--black); }
    .accordion-section:first-child { border-top: 2px solid var(--black); }
    .accordion-header {
      min-height: 72px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px; cursor: pointer; background: var(--white);
    }
    .accordion-header-left { display: flex; align-items: center; gap: 6px; }
    .accordion-title { font-size: 20px; font-weight: 500; }
    .accordion-count { width: 10px; height: 10px; background: var(--red); display: none; }
    .accordion-chevron {
      width: 20px; height: 20px; transition: transform 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .accordion-chevron svg { width: 16px; height: 16px; stroke: var(--black); stroke-width: 1.5px; }
    .accordion-chevron.open { transform: rotate(180deg); }
    .accordion-body { display: none; border-top: 2px solid var(--black); }
    .accordion-body.open { display: block; }

    /* ── Sub-tabs inside accordion ─────────────────────────── */
    .sub-tabs { display: flex; gap: 0; padding: 0; flex-wrap: wrap; background: #F6F6F6; }
    .sub-tab {
      display: flex; gap: 6px; align-items: center; padding: 10px 12px;
      border: none; border-bottom: 3px solid transparent; background: transparent; color: var(--black);
      font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer;
    }
    .sub-tab .sub-tab-count {
      font-size: 11px; background: var(--gray); padding: 1px 5px; line-height: 1.3;
    }
    .sub-tab .sub-tab-count.no-token-count { color: var(--red); }
    .sub-tab.active { border-bottom-color: var(--yellow); }

    /* ── Results content inside accordion ──────────────────── */
    .results-content { padding: 12px; }

    .state-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: var(--gray-text); gap: 8px; padding: 30px 16px;
    }
    .state-empty .icon { font-size: 20px; opacity: 0.5; }
    .state-empty .msg { font-size: 13px; line-height: 1.5; }

    /* ── Color group card ─────────────────────────────────── */
    .color-group { background: #F6F6F6; margin-bottom: 8px; }
    .color-group-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px;
    }
    .swatch { width: 40px; height: 40px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
    .color-group-info { flex: 1; min-width: 0; }
    .color-hex { font-size: 14px; font-weight: 700; }
    .color-detail { font-size: 12px; color: var(--gray-text); margin-top: 2px; }

    .select-btn {
      border: none; background: var(--white);
      padding: 6px 12px; font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .select-btn:hover { background: var(--black); color: var(--white); }

    /* ── Token entries ─────────────────────────────────────── */
    .token-entries { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
    .token-entry { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
    .token-entry-name { font-size: 13px; font-weight: 700; word-break: break-all; }
    .token-entry-alias { font-size: 12px; color: var(--gray-text); }
    .tag { display: inline-block; padding: 1px 6px; font-size: 11px; font-weight: 500; }
    .tag-property { background: #f0f0f0; color: #666; }
    .tag-foreign { background: #fff7ed; color: #c2410c; }
    .tag-notoken { background: #fef2f2; color: #dc2626; }
    .tag-theme { background: #f5f3ff; color: #6d28d9; }
    .tag-primitive { background: #eff6ff; color: #1d4ed8; }

    /* ── Layer list ───────────────────────────────────────── */
    .layer-item {
      font-size: 13px; color: var(--gray-text);
      display: flex; align-items: center; gap: 6px; padding: 3px 0;
    }
    .layer-icon { font-size: 12px; opacity: 0.6; flex-shrink: 0; width: 16px; text-align: center; }

    /* ── Typography card ──────────────────────────────────── */
    .typo-group { background: #F6F6F6; margin-bottom: 8px; }
    .typo-group-header { display: flex; align-items: center; gap: 12px; padding: 12px; }
    .typo-preview { font-size: 22px; font-weight: 700; flex-shrink: 0; width: 40px; text-align: center; }
    .typo-group-info { flex: 1; min-width: 0; }
    .typo-style-name { font-size: 14px; font-weight: 700; word-break: break-all; }
    .typo-details { font-size: 12px; color: var(--gray-text); margin-top: 2px; }

    /* ── Radius / Border card ─────────────────────────────── */
    .radius-group { background: #F6F6F6; margin-bottom: 8px; }
    .radius-group-header { display: flex; align-items: center; gap: 12px; padding: 12px; }
    .radius-preview { width: 28px; height: 28px; border: 2px solid var(--black); flex-shrink: 0; }
    .radius-group-info { flex: 1; min-width: 0; }
    .radius-value { font-size: 14px; font-weight: 700; }
    .radius-corners, .border-sides { font-size: 12px; color: var(--gray-text); margin-top: 1px; }
  </style>
</head>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    var selectionCount = 0;
    var hasScanned = false;
    var isRescan = false;
    var expandedSection = null;
    var scanResultsReceived = 0;
    var MAX_FRAMES = 15;

    // Active sub-tab per category
    var activeSubTab = {
      'colors': 'no-token',
      'typography': 'no-token',
      'corner-radius': 'no-token',
      'border-width': 'no-token',
      'effects': 'no-token',
    };

    // Store grouped results per category
    var scanData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
    var typoData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };
    var radiusData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
    var borderData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
    var effectsData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };

    // ── Handle messages from code.js ─────────────────────────────────────────
    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection-changed') {
        selectionCount = Math.min(msg.count, MAX_FRAMES);
        var isMaxed = msg.isMaxed || msg.count > MAX_FRAMES;

        // If we're in results view, stay there (user clicked "Select")
        if (!hasScanned) {
          document.getElementById('resultsView').style.display = 'none';
          document.getElementById('preScanView').style.display = '';
          updatePrescanMsg(selectionCount);
          updateSelectionUI(isMaxed);
        }
      }

      if (msg.type === 'scan-results') {
        scanResultsReceived++;
        if (msg.category === 'typography') {

    function updatePrescanMsg(count) {
      var msg = document.getElementById('prescanMsg');
      var frogImg = document.querySelector('.frog-container img');
      if (count === 0) {
        msg.textContent = 'select frame(s)';
        msg.style.visibility = '';
        frogImg.src = FROG_STATIC;
      } else {
        msg.style.visibility = 'hidden';
        frogImg.src = FROG_SELECTED;
      }
    }

    // ── Selection UI (bottom bar) ────────────────────────────────────────────
    function updateSelectionUI(isMaxed) {
      var dot = document.getElementById('statusDot');
      var text = document.getElementById('statusText');
      var btn = document.getElementById('scanBtn');
      if (selectionCount > 0) {
        dot.className = 'status-dot active';
        text.textContent = selectionCount + ' layer' + (selectionCount !== 1 ? 's' : '') + ' selected';
        btn.disabled = false;
        btn.className = 'scan-btn ready';
        btn.textContent = 'SCAN';
      } else {
        dot.className = 'status-dot';
        text.textContent = '0 layers selected';
        btn.disabled = true;
        btn.className = 'scan-btn';
        btn.textContent = 'SCAN';
      }
    }

    var scanMinDelayMet = false;
    var scanAllResultsIn = false;

    function runScan() {
      var btn = document.getElementById('scanBtn');
      btn.disabled = true;
      btn.className = 'scan-btn';
      btn.textContent = 'SCANNING';
      scanResultsReceived = 0;
      scanMinDelayMet = false;
      scanAllResultsIn = false;

      // Show scanning view
      document.getElementById('preScanView').style.display = 'none';
      document.getElementById('bottomBar').style.display = 'none';
      var sv = document.getElementById('scanningView');
      sv.querySelector('.scanning-frog').src = FROG_SELECTED;
      sv.style.display = 'flex';

      // Minimum 2s display
      setTimeout(function () {
        scanMinDelayMet = true;
        if (scanAllResultsIn) finishScan();
      }, 2000);

      var categories = ['colors', 'typography', 'corner-radius', 'border-width', 'effects'];
      for (var i = 0; i < categories.length; i++) {
        parent.postMessage({ pluginMessage: { type: 'scan', category: categories[i] } }, '*');
      }
    }

    function selectInFigma(ids) {
      parent.postMessage({ pluginMessage: { type: 'select-nodes', ids: ids } }, '*');
    }

    function reRunScan() {
      isRescan = true;
      scanResultsReceived = 0;
      scanMinDelayMet = false;
      scanAllResultsIn = false;

      // Clear existing data
      scanData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
      typoData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };
      radiusData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
      borderData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
      effectsData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };

      // Show scanning view
      document.getElementById('resultsView').style.display = 'none';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('rescanBtn').style.display = 'none';
      document.getElementById('headerFrog').style.display = 'none';
      var sv = document.getElementById('scanningView');
      sv.querySelector('.scanning-frog').src = FROG_SELECTED;
      sv.style.display = 'flex';

      // Minimum 2s display
      setTimeout(function () {
        scanMinDelayMet = true;
        if (scanAllResultsIn) finishScan();
      }, 2000);

      var categories = ['colors', 'typography', 'corner-radius', 'border-width', 'effects'];
      for (var i = 0; i < categories.length; i++) {
        parent.postMessage({ pluginMessage: { type: 're-scan', category: categories[i] } }, '*');
      }
    }

    function finishScan() {
      hasScanned = true;

      document.getElementById('scanningView').style.display = 'none';
      document.getElementById('preScanView').style.display = 'none';
      document.getElementById('resultsView').style.display = '';
      document.getElementById('bottomBar').style.display = 'none';
      document.getElementById('backBtn').style.display = 'inline-flex';
      document.getElementById('rescanBtn').style.display = 'inline-block';
      var hf = document.getElementById('headerFrog');
      hf.src = FROG_SELECTED;
      hf.style.display = '';
      document.getElementById('headerMeta').style.display = 'none';
      document.querySelector('.header-title').style.display = 'none';
      document.querySelector('.header').style.padding = '16px 16px';

      updateAccordionCounts();

      // If this was a re-scan, re-render the currently open accordion
      if (isRescan && expandedSection) {
        renderSubTabs(expandedSection);
        renderCategoryContent(expandedSection);
      }
      isRescan = false;
    }

    function goBack() {
      hasScanned = false;
      expandedSection = null;

      // Reset UI to fresh state
      document.getElementById('scanningView').style.display = 'none';
      document.getElementById('resultsView').style.display = 'none';
      document.getElementById('preScanView').style.display = '';
      document.getElementById('bottomBar').style.display = '';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('rescanBtn').style.display = 'none';
      document.getElementById('headerFrog').style.display = 'none';
      document.getElementById('headerMeta').style.display = '';
      document.querySelector('.header-title').style.display = '';
      document.querySelector('.header').style.padding = '';

      // Ask code.js to re-send the actual Figma selection count
      parent.postMessage({ pluginMessage: { type: 'refresh-selection' } }, '*');
    }

    // ── Accordion counts ─────────────────────────────────────────────────────
    function updateAccordionCounts() {
      showRedDot('accordionCountColors', scanData);
      showRedDot('accordionCountTypography', typoData);
      showRedDot('accordionCountCornerRadius', radiusData);
      showRedDot('accordionCountBorderWidth', borderData);
      showRedDot('accordionCountEffects', effectsData);
    }

    function showRedDot(id, data) {
      var el = document.getElementById(id);
      var count = data.noTokenGroups ? data.noTokenGroups.length : 0;
      el.style.display = count >= 1 ? 'inline-block' : 'none';
    }

    function getTotalCount(data) {
      var total = 0;
      if (data.noTokenGroups) total += data.noTokenGroups.length;
      if (data.foreignGroups) total += data.foreignGroups.length;
      if (data.primitiveGroups) total += data.primitiveGroups.length;
      if (data.themeGroups) total += data.themeGroups.length;
      return total;
    }

    // ── Accordion toggle ─────────────────────────────────────────────────────
    function toggleAccordion(category) {
      var bodyIdMap = { 'colors': 'bodyColors', 'typography': 'bodyTypography', 'corner-radius': 'bodyCornerRadius', 'border-width': 'bodyBorderWidth', 'effects': 'bodyEffects' };
      var chevronIdMap = { 'colors': 'chevronColors', 'typography': 'chevronTypography', 'corner-radius': 'chevronCornerRadius', 'border-width': 'chevronBorderWidth', 'effects': 'chevronEffects' };

      if (expandedSection === category) {
        // Collapse
        document.getElementById(bodyIdMap[category]).className = 'accordion-body';
        document.getElementById(chevronIdMap[category]).className = 'accordion-chevron';
        expandedSection = null;
      } else {
        // Collapse previous
        if (expandedSection) {
          document.getElementById(bodyIdMap[expandedSection]).className = 'accordion-body';
          document.getElementById(chevronIdMap[expandedSection]).className = 'accordion-chevron';
        }
        // Expand new
        expandedSection = category;
        document.getElementById(bodyIdMap[category]).className = 'accordion-body open';
        document.getElementById(chevronIdMap[category]).className = 'accordion-chevron open';

        renderSubTabs(category);
        renderCategoryContent(category);
      }
    }

    // ── Sub-tabs rendering ───────────────────────────────────────────────────
    function renderSubTabs(category) {
      var subTabsIdMap = { 'colors': 'subTabsColors', 'typography': 'subTabsTypography', 'corner-radius': 'subTabsCornerRadius', 'border-width': 'subTabsBorderWidth', 'effects': 'subTabsEffects' };
      var container = document.getElementById(subTabsIdMap[category]);
      var data = getDataForCategory(category);
      var tiers = getTiersForCategory(category);
      var activeTier = activeSubTab[category];

      var html = '';
      for (var i = 0; i < tiers.length; i++) {
        var tier = tiers[i];
        var count = getGroupCount(data, tier);
        var cls = tier === activeTier ? 'sub-tab active' : 'sub-tab';
        html += '<button class="' + cls + '" onclick="switchSubTab(\'' + category + '\', \'' + tier + '\')">';
        var countCls = tier === 'no-token' ? 'sub-tab-count no-token-count' : 'sub-tab-count';
        html += escapeHtml(tierLabel(tier)) + ' <span class="' + countCls + '">' + count + '</span>';
        html += '</button>';
      }
      container.innerHTML = html;
    }

    function switchSubTab(category, tier) {
      activeSubTab[category] = tier;
      renderSubTabs(category);
      renderCategoryContent(category);
    }

    function getDataForCategory(category) {
      if (category === 'colors') return scanData;
      if (category === 'typography') return typoData;
      if (category === 'corner-radius') return radiusData;
      if (category === 'border-width') return borderData;
      if (category === 'effects') return effectsData;
      return scanData;
    }

    function getTiersForCategory(category) {
      if (category === 'typography' || category === 'effects') {
        return ['no-token', 'foreign', 'theme'];
      }
      return ['no-token', 'foreign', 'primitive', 'theme'];
    }

    function tierLabel(tier) {
      if (tier === 'no-token') return 'No token';
      if (tier === 'foreign') return 'Foreign';
      if (tier === 'primitive') return 'Primitive';
      if (tier === 'theme') return 'Theme';
      return tier;
    }

    function getGroupCount(data, tier) {
      if (tier === 'no-token') return data.noTokenGroups.length;
      if (tier === 'foreign') return data.foreignGroups.length;
      if (tier === 'primitive') return data.primitiveGroups ? data.primitiveGroups.length : 0;
      if (tier === 'theme') return data.themeGroups.length;
      return 0;
    }

    function getGroups(data, tier) {
      if (tier === 'no-token') return data.noTokenGroups;
      if (tier === 'foreign') return data.foreignGroups;
      if (tier === 'primitive') return data.primitiveGroups || [];
      if (tier === 'theme') return data.themeGroups;
      return [];
    }

    // ── Render content for a category ────────────────────────────────────────
    function renderCategoryContent(category) {
      var contentIdMap = { 'colors': 'contentColors', 'typography': 'contentTypography', 'corner-radius': 'contentCornerRadius', 'border-width': 'contentBorderWidth', 'effects': 'contentEffects' };
      var container = document.getElementById(contentIdMap[category]);
      var data = getDataForCategory(category);
      var tier = activeSubTab[category];
      var groups = getGroups(data, tier);

      if (groups.length === 0) {
        container.innerHTML =
          '<div class="state-empty">' +
            '<div class="icon">&#x25CB;</div>' +
            '<div class="msg">No ' + escapeHtml(tierLabel(tier).toLowerCase()) + ' results found.</div>' +
          '</div>';
        return;
      }

      var tierClass = tier === 'no-token' ? 'notoken' : tier;
      var html = '';

      if (category === 'colors') {
        for (var i = 0; i < groups.length; i++) html += renderColorGroup(groups[i], tierClass);
      } else if (category === 'typography') {
        for (var i = 0; i < groups.length; i++) html += renderTypoGroup(groups[i], tierClass);
      } else if (category === 'corner-radius') {
        for (var i = 0; i < groups.length; i++) html += renderRadiusGroup(groups[i]);
      } else if (category === 'border-width') {
        for (var i = 0; i < groups.length; i++) html += renderBorderGroup(groups[i]);
      } else if (category === 'effects') {
        for (var i = 0; i < groups.length; i++) html += renderEffectsGroup(groups[i]);
      }

      container.innerHTML = html;

      // Attach click handlers for select buttons
      var btns = container.querySelectorAll('[data-select-ids]');
      for (var j = 0; j < btns.length; j++) {
        (function (btn) {
          btn.onclick = function () {
            selectInFigma(JSON.parse(btn.getAttribute('data-select-ids')));
          };
        })(btns[j]);
      }
    }

    // ══════════════════════════════════════════════════════════════════════════
    // HANDLE SCAN RESULTS (store data only — no DOM rendering)
    // ══════════════════════════════════════════════════════════════════════════

    function handleScanResults(result) {
      if (result.error || !result.entries || result.entries.length === 0) {
        scanData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
        return;
      }
      var entries = result.entries;
      scanData.noTokenGroups = groupByHex(entries.filter(function (e) { return e.tier === 'no-token'; }));
      scanData.foreignGroups = groupByHex(entries.filter(function (e) { return e.tier === 'foreign'; }));
      scanData.primitiveGroups = groupByHex(entries.filter(function (e) { return e.tier === 'primitive'; }));
      scanData.themeGroups = groupByHex(entries.filter(function (e) { return e.tier === 'theme'; }));
      activeSubTab['colors'] = 'no-token';
    }

    function handleTypoResults(result) {
      if (result.error || !result.entries || result.entries.length === 0) {
        typoData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };
        return;
      }
      var entries = result.entries;
      typoData.noTokenGroups = groupTypoBySignature(entries.filter(function (e) { return e.tier === 'no-token'; }));
      typoData.foreignGroups = groupTypoByStyle(entries.filter(function (e) { return e.tier === 'foreign'; }));
      typoData.themeGroups = groupTypoByStyle(entries.filter(function (e) { return e.tier === 'theme'; }));
      activeSubTab['typography'] = 'no-token';
    }

    function handleRadiusResults(result) {
      if (result.error || !result.entries || result.entries.length === 0) {
        radiusData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
        return;
      }
      var entries = result.entries;
      radiusData.noTokenGroups = groupRadiusByValue(entries.filter(function (e) { return e.tier === 'no-token'; }));
      radiusData.foreignGroups = groupRadiusByToken(entries.filter(function (e) { return e.tier === 'foreign'; }));
      radiusData.primitiveGroups = groupRadiusByToken(entries.filter(function (e) { return e.tier === 'primitive'; }));
      radiusData.themeGroups = groupRadiusByToken(entries.filter(function (e) { return e.tier === 'theme'; }));
      activeSubTab['corner-radius'] = 'no-token';
    }

    function handleBorderResults(result) {
      if (result.error || !result.entries || result.entries.length === 0) {
        borderData = { noTokenGroups: [], foreignGroups: [], primitiveGroups: [], themeGroups: [] };
        return;
      }
      var entries = result.entries;
      borderData.noTokenGroups = groupBorderByValue(entries.filter(function (e) { return e.tier === 'no-token'; }));
      borderData.foreignGroups = groupBorderByToken(entries.filter(function (e) { return e.tier === 'foreign'; }));
      borderData.primitiveGroups = groupBorderByToken(entries.filter(function (e) { return e.tier === 'primitive'; }));
      borderData.themeGroups = groupBorderByToken(entries.filter(function (e) { return e.tier === 'theme'; }));
      activeSubTab['border-width'] = 'no-token';
    }

    function handleEffectsResults(result) {
      if (result.error || !result.entries || result.entries.length === 0) {
        effectsData = { noTokenGroups: [], foreignGroups: [], themeGroups: [] };
        return;
      }
      var entries = result.entries;
      effectsData.noTokenGroups = groupEffectsBySummary(entries.filter(function (e) { return e.tier === 'no-token'; }));
      effectsData.foreignGroups = groupEffectsByStyle(entries.filter(function (e) { return e.tier === 'foreign'; }));
      effectsData.themeGroups = groupEffectsByStyle(entries.filter(function (e) { return e.tier === 'theme'; }));
      activeSubTab['effects'] = 'no-token';
    }

    // ══════════════════════════════════════════════════════════════════════════
    // GROUPING FUNCTIONS (unchanged)
    // ══════════════════════════════════════════════════════════════════════════

    function groupByHex(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.hex;
        if (!map[key]) {
          map[key] = { hex: e.hex, alpha: e.alpha, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupTypoByStyle(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.styleName;
        if (!map[key]) {
          map[key] = { styleName: e.styleName, fontFamily: e.fontFamily, fontSize: e.fontSize, fontWeight: e.fontWeight, lineHeight: e.lineHeight, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupTypoBySignature(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.fontFamily + '|' + e.fontSize + '|' + e.fontWeight + '|' + e.lineHeight;
        if (!map[key]) {
          map[key] = { styleName: null, fontFamily: e.fontFamily, fontSize: e.fontSize, fontWeight: e.fontWeight, lineHeight: e.lineHeight, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupRadiusByValue(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = String(e.value);
        if (!map[key]) {
          map[key] = { value: e.value, tokenName: null, isUniform: e.isUniform, corners: e.corners, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupRadiusByToken(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.tokenName;
        if (!map[key]) {
          map[key] = { value: e.value, tokenName: e.tokenName, collectionName: e.collectionName, isUniform: e.isUniform, corners: e.corners, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupBorderByValue(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = String(e.value);
        if (!map[key]) {
          map[key] = { value: e.value, tokenName: null, isUniform: e.isUniform, sides: e.sides, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupBorderByToken(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.tokenName;
        if (!map[key]) {
          map[key] = { value: e.value, tokenName: e.tokenName, collectionName: e.collectionName, isUniform: e.isUniform, sides: e.sides, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupEffectsByStyle(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.styleName;
        if (!map[key]) {
          map[key] = { styleName: e.styleName, effectSummary: e.effectSummary, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    function groupEffectsBySummary(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.effectSummary;
        if (!map[key]) {
          map[key] = { styleName: null, effectSummary: e.effectSummary, entries: [] };
          order.push(key);
        }
        map[key].entries.push(e);
      }
      var groups = [];
      for (var j = 0; j < order.length; j++) groups.push(map[order[j]]);
      return groups;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // RENDER FUNCTIONS (unchanged card markup — CSS handles styling)
    // ══════════════════════════════════════════════════════════════════════════

    function renderColorGroup(group, tierClass) {
      var hex = group.hex;
      var alpha = group.alpha;
      var entries = group.entries;

      var layerIdSet = {};
      for (var i = 0; i < entries.length; i++) layerIdSet[entries[i].layerId] = true;
      var layerIds = Object.keys(layerIdSet);

      var swatchStyle = alpha < 1
        ? 'background: ' + hex + '; opacity: ' + alpha.toFixed(2)
        : 'background: ' + hex;

      var alphaStr = alpha < 1 ? ' \u00B7 ' + Math.round(alpha * 100) + '%' : '';
      var layerCount = layerIds.length;
      var layerLabel = layerCount + ' layer' + (layerCount !== 1 ? 's' : '');

      var html = '<div class="color-group">';
      html += '<div class="color-group-header">';
      html += '<div class="swatch" style="' + swatchStyle + '"></div>';
      html += '<div class="color-group-info">';
      html += '<div class="color-hex">' + escapeHtml(hex) + alphaStr + '</div>';
      html += '<div class="color-detail">' + layerLabel + '</div>';
      html += '</div>';
      html += '<button class="select-btn" data-select-ids=\'' + JSON.stringify(layerIds) + '\'>Select</button>';
      html += '</div>';

      html += '<div class="token-entries">';
      if (tierClass === 'notoken') {
        var uniqueLayers = dedupeById(entries.map(function (e) {
          return { id: e.layerId, name: e.layerName, type: e.layerType, property: e.property };
        }));
        for (var j = 0; j < uniqueLayers.length && j < 6; j++) {
          var l = uniqueLayers[j];
          html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(l.type) + '</span>' + escapeHtml(l.name) + ' <span class="tag tag-property">' + escapeHtml(l.property) + '</span></div>';
        }
        if (uniqueLayers.length > 6) {
          html += '<div class="layer-item" style="opacity:0.5">+ ' + (uniqueLayers.length - 6) + ' more</div>';
        }
      } else if (tierClass === 'foreign') {
        var foreignTokens = getUniqueTokens(entries);
        for (var f = 0; f < foreignTokens.length; f++) {
          var ft = foreignTokens[f];
          html += '<div class="token-entry">';
          html += '<span class="token-entry-name">' + escapeHtml(ft.name) + '</span>';
          html += '<span class="tag tag-foreign">Foreign</span>';
          html += '<span class="tag tag-property">' + escapeHtml(ft.property) + '</span>';
          if (ft.collectionName) html += '<span class="token-entry-alias">' + escapeHtml(ft.collectionName) + '</span>';
          html += '</div>';
          for (var fm = 0; fm < ft.layers.length && fm < 4; fm++) {
            var fl = ft.layers[fm];
            html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(fl.type) + '</span>' + escapeHtml(fl.name) + '</div>';
          }
          if (ft.layers.length > 4) html += '<div class="layer-item" style="opacity:0.5">+ ' + (ft.layers.length - 4) + ' more</div>';
        }
      } else {
        var tokenNames = getUniqueTokens(entries);
        for (var k = 0; k < tokenNames.length; k++) {
          var token = tokenNames[k];
          html += '<div class="token-entry">';
          html += '<span class="token-entry-name">' + escapeHtml(token.name) + '</span>';
          html += '<span class="tag tag-property">' + escapeHtml(token.property) + '</span>';
          if (token.aliasOf) html += '<span class="token-entry-alias">\u2190 ' + escapeHtml(token.aliasOf) + '</span>';
          html += '</div>';
          for (var m = 0; m < token.layers.length && m < 4; m++) {
            var tl = token.layers[m];
            html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(tl.type) + '</span>' + escapeHtml(tl.name) + '</div>';
          }
          if (token.layers.length > 4) html += '<div class="layer-item" style="opacity:0.5">+ ' + (token.layers.length - 4) + ' more</div>';
        }
      }
      html += '</div></div>';
      return html;
    }

    function renderTypoGroup(group, tierClass) {
      var entries = group.entries;
      var layerIdSet = {};
      for (var i = 0; i < entries.length; i++) layerIdSet[entries[i].layerId] = true;
      var layerIds = Object.keys(layerIdSet);
      var layerLabel = layerIds.length + ' layer' + (layerIds.length !== 1 ? 's' : '');

      var details = escapeHtml(group.fontFamily) + ' \u00B7 ' + escapeHtml(String(group.fontSize)) + 'px \u00B7 ' + escapeHtml(String(group.fontWeight)) + ' \u00B7 ' + escapeHtml(String(group.lineHeight));

      var html = '<div class="typo-group">';
      html += '<div class="typo-group-header">';
      html += '<div class="typo-preview">Aa</div>';
      html += '<div class="typo-group-info">';
      if (group.styleName) {
        html += '<div class="typo-style-name">' + escapeHtml(group.styleName) + '</div>';
      } else {
        html += '<div class="typo-style-name" style="color:var(--tag-notoken-text)">No style</div>';
      }
      html += '<div class="typo-details">' + details + '</div>';
      html += '<div class="color-detail">' + layerLabel + '</div>';
      html += '</div>';
      html += '<button class="select-btn" data-select-ids=\'' + JSON.stringify(layerIds) + '\'>Select</button>';
      html += '</div>';

      html += '<div class="token-entries">';
      var uniqueLayers = dedupeById(entries.map(function (e) {
        return { id: e.layerId, name: e.layerName, type: e.layerType };
      }));
      for (var j = 0; j < uniqueLayers.length && j < 5; j++) {
        var l = uniqueLayers[j];
        html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(l.type) + '</span>' + escapeHtml(l.name) + '</div>';
      }
      if (uniqueLayers.length > 5) html += '<div class="layer-item" style="opacity:0.5">+ ' + (uniqueLayers.length - 5) + ' more</div>';
      html += '</div></div>';
      return html;
    }

    function renderRadiusGroup(group) {
      var entries = group.entries;
      var layerIdSet = {};
      for (var i = 0; i < entries.length; i++) layerIdSet[entries[i].layerId] = true;
      var layerIds = Object.keys(layerIdSet);
      var layerLabel = layerIds.length + ' layer' + (layerIds.length !== 1 ? 's' : '');

      var valueStr = typeof group.value === 'number' ? group.value + 'px' : String(group.value);
      var previewRadius = typeof group.value === 'number' ? Math.min(group.value, 14) + 'px' : '4px';

      var html = '<div class="radius-group">';
      html += '<div class="radius-group-header">';
      html += '<div class="radius-preview" style="border-radius:' + previewRadius + '"></div>';
      html += '<div class="radius-group-info">';
      if (group.tokenName) {
        html += '<div class="radius-value">' + escapeHtml(group.tokenName) + '</div>';
        html += '<div class="radius-corners">' + escapeHtml(valueStr) + '</div>';
      } else {
        html += '<div class="radius-value">' + escapeHtml(valueStr) + '</div>';
      }
      if (!group.isUniform && group.corners) {
        html += '<div class="radius-corners">' + escapeHtml(group.corners.join(' \u00B7 ')) + '</div>';
      }
      html += '<div class="color-detail">' + layerLabel + '</div>';
      html += '</div>';
      html += '<button class="select-btn" data-select-ids=\'' + JSON.stringify(layerIds) + '\'>Select</button>';
      html += '</div>';

      html += '<div class="token-entries">';
      var uniqueLayers = dedupeById(entries.map(function (e) {
        return { id: e.layerId, name: e.layerName, type: e.layerType };
      }));
      for (var j = 0; j < uniqueLayers.length && j < 5; j++) {
        var l = uniqueLayers[j];
        html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(l.type) + '</span>' + escapeHtml(l.name) + '</div>';
      }
      if (uniqueLayers.length > 5) html += '<div class="layer-item" style="opacity:0.5">+ ' + (uniqueLayers.length - 5) + ' more</div>';
      html += '</div></div>';
      return html;
    }

    function renderBorderGroup(group) {
      var entries = group.entries;
      var layerIdSet = {};
      for (var i = 0; i < entries.length; i++) layerIdSet[entries[i].layerId] = true;
      var layerIds = Object.keys(layerIdSet);
      var layerLabel = layerIds.length + ' layer' + (layerIds.length !== 1 ? 's' : '');

      var valueStr = typeof group.value === 'number' ? group.value + 'px' : String(group.value);
      var previewWidth = typeof group.value === 'number' ? Math.min(Math.max(group.value, 1), 6) : 2;

      var html = '<div class="radius-group">';
      html += '<div class="radius-group-header">';
      html += '<div style="width:28px;height:28px;border:' + previewWidth + 'px solid var(--black);border-radius:4px;flex-shrink:0"></div>';
      html += '<div class="radius-group-info">';
      if (group.tokenName) {
        html += '<div class="radius-value">' + escapeHtml(group.tokenName) + '</div>';
        html += '<div class="border-sides">' + escapeHtml(valueStr) + '</div>';
      } else {
        html += '<div class="radius-value">' + escapeHtml(valueStr) + '</div>';
      }
      if (!group.isUniform && group.sides) {
        html += '<div class="border-sides">' + escapeHtml(group.sides.join(' \u00B7 ')) + '</div>';
      }
      html += '<div class="color-detail">' + layerLabel + '</div>';
      html += '</div>';
      html += '<button class="select-btn" data-select-ids=\'' + JSON.stringify(layerIds) + '\'>Select</button>';
      html += '</div>';

      html += '<div class="token-entries">';
      var uniqueLayers = dedupeById(entries.map(function (e) {
        return { id: e.layerId, name: e.layerName, type: e.layerType };
      }));
      for (var j = 0; j < uniqueLayers.length && j < 5; j++) {
        var l = uniqueLayers[j];
        html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(l.type) + '</span>' + escapeHtml(l.name) + '</div>';
      }
      if (uniqueLayers.length > 5) html += '<div class="layer-item" style="opacity:0.5">+ ' + (uniqueLayers.length - 5) + ' more</div>';
      html += '</div></div>';
      return html;
    }

    function renderEffectsGroup(group) {
      var entries = group.entries;
      var layerIdSet = {};
      for (var i = 0; i < entries.length; i++) layerIdSet[entries[i].layerId] = true;
      var layerIds = Object.keys(layerIdSet);
      var layerLabel = layerIds.length + ' layer' + (layerIds.length !== 1 ? 's' : '');

      var html = '<div class="typo-group">';
      html += '<div class="typo-group-header">';
      html += '<div class="typo-preview" style="font-size:16px;opacity:0.6">\u2736</div>';
      html += '<div class="typo-group-info">';
      if (group.styleName) {
        html += '<div class="typo-style-name">' + escapeHtml(group.styleName) + '</div>';
      } else {
        html += '<div class="typo-style-name" style="color:var(--tag-notoken-text)">No style</div>';
      }
      html += '<div class="typo-details">' + escapeHtml(group.effectSummary) + '</div>';
      html += '<div class="color-detail">' + layerLabel + '</div>';
      html += '</div>';
      html += '<button class="select-btn" data-select-ids=\'' + JSON.stringify(layerIds) + '\'>Select</button>';
      html += '</div>';

      html += '<div class="token-entries">';
      var uniqueLayers = dedupeById(entries.map(function (e) {
        return { id: e.layerId, name: e.layerName, type: e.layerType };
      }));
      for (var j = 0; j < uniqueLayers.length && j < 5; j++) {
        var l = uniqueLayers[j];
        html += '<div class="layer-item"><span class="layer-icon">' + layerIcon(l.type) + '</span>' + escapeHtml(l.name) + '</div>';
      }
      if (uniqueLayers.length > 5) html += '<div class="layer-item" style="opacity:0.5">+ ' + (uniqueLayers.length - 5) + ' more</div>';
      html += '</div></div>';
      return html;
    }

    // ── Shared helpers ───────────────────────────────────────────────────────

    function getUniqueTokens(entries) {
      var map = {};
      var order = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.tokenName + '|' + e.property;
        if (!map[key]) {
          map[key] = { name: e.tokenName, aliasOf: e.aliasOf, collectionName: e.collectionName || null, property: e.property, layers: [] };
          order.push(key);
        }
        var found = false;
        for (var j = 0; j < map[key].layers.length; j++) {
          if (map[key].layers[j].id === e.layerId) { found = true; break; }
        }
        if (!found) map[key].layers.push({ id: e.layerId, name: e.layerName, type: e.layerType });
      }
      var result = [];
      for (var k = 0; k < order.length; k++) result.push(map[order[k]]);
      return result;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function dedupeById(items) {
      var seen = {};
      var result = [];
      for (var i = 0; i < items.length; i++) {
        if (!seen[items[i].id]) {
          seen[items[i].id] = true;
          result.push(items[i]);
        }
      }
      return result;
    }

    function layerIcon(type) {
      var icons = {
        FRAME: '\u25A3', COMPONENT: '\u25C8', INSTANCE: '\u25C8', GROUP: '\u22A1',
        TEXT: 'T', RECTANGLE: '\u25AC', ELLIPSE: '\u25CB', VECTOR: '\u25C7',
        SECTION: '\u2B1C', PAGE: '\u2B1C',
      };
      return icons[type] || '\u00B7';
    }
  </script>
